<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONRISE — Fórum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="forum.css">
    <link rel="stylesheet" href="info.css">
</head>

<body>
    <header class="site-header">
        <div class="brand">ONRISE</div>
        <div class="header-right">
            <div class="pills">
                <a href="index.html"><div class="pill ajustes">NOTÍCIAS</div></a>
                <a href="info.html"><div class="pill ajustes">INFORMAÇÕES</div></a>
                <a href="indexmoi.html"><div class="pill ajustes">TRILHAS</div></a>
                <a href="perfil.html"><div class="pill ajustes">PERFIL</div></a>
                <a href="forum.html"><div class="pill ajustes">FORUM</div></a>
            </div>
        </div>
    </header>

    <div class="container-fluid" id="corpo">
        <div class="titulo">FÓRUM</div>
        <h5>Criar Novo Tópico</h5>
        <div class="row g-2">
            <div class="col-md-4">
                <input id="novoTitulo" class="form-control" placeholder="Título do tópico">
            </div>
            <div class="col-md-3">
                <input id="novoAutor" class="form-control" placeholder="Autor">
            </div>
            <div class="col-md-3">
                <select id="novaCategoria" class="form-control">
                    <option value="quentes">Quentes</option>
                    <option value="recentes">Recentes</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="btnCriarTopico" class="btn btn-primary w-100">Adicionar</button>
            </div>
        </div>
    </div>


    <div class="row mt-4 text-center" id="areaTopicos"></div>
    </div>


    <div class="comments-overlay" id="commentsOverlay" style="display:none;">
        <div class="comments-modal">
            <div class="comments-header">
                <button id="closeComments" class="btn-close-topic">
                    <span>✖</span>
                </button>
                <h3 id="modalTopicTitle"></h3>
                <p id="modalTopicMeta"></p>
            </div>


            <div class="comments-body" id="commentsBody"></div>


            <div class="p-3 border-top">
                <h6>Adicionar Comentário</h6>
                <input id="novoComentAutor" class="form-control mb-2" placeholder="Autor">
                <textarea id="novoComentTexto" class="form-control mb-2" placeholder="Comentário..."></textarea>
                <button id="btnComentar" class="btn btn-success w-100">Enviar</button>
            </div>
        </div>
    </div>

    <div id="editOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content p-4">
            <h3 class="mb-3">Editar Tópico</h3>

            <label class="form-label">Título</label>
            <input type="text" id="editTitulo" class="form-control mb-3">

            <label class="form-label">Autor</label>
            <input type="text" id="editAutor" class="form-control mb-3">

            <label class="form-label">Categoria</label>
            <select id="editCategoria" class="form-control mb-3">
                <option value="quentes">Quentes</option>
                <option value="recentes">Recentes</option>
            </select>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
                <button class="btn btn-success" onclick="saveTopicEdit()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="editCommentOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-content p-4">
        <h3 class="mb-3">Editar Comentário</h3>

        <label class="form-label">Autor</label>
        <input type="text" id="editComentAutor" class="form-control mb-3">

        <label class="form-label">Comentário</label>
        <textarea id="editComentTexto" class="form-control mb-3" rows="4"></textarea>

        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-secondary" onclick="closeEditCommentModal()">Cancelar</button>
            <button class="btn btn-success" onclick="saveCommentEdit()">Salvar</button>
        </div>
    </div>
</div>




    <script src="forum.js"></script>
</body>

</html>
