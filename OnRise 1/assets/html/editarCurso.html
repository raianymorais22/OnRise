<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Curso</title>

    <link rel="stylesheet" href="../css/editarCurso.css">
    <link rel="stylesheet" href="../css/verTodosCursos.css">
</head>

<body>

    <div class="main-content">

        <div class="top-header">
            <button class="close-btn" onclick="window.history.back()">✕</button>
            <h1 class="page-title">TRILHA / CURSOS</h1>
        </div>

        <div class="edit-course-wrapper">

            <div class="info-container">

                <div class="image-details-row">

                    <div class="image-upload-box-container">
                        <label class="input-label">CAPA</label>

                        <div class="upload-box upload-size-cover" id="course-image-box" data-type="image">
                            <img id="course-image-preview" class="upload-preview hidden" alt="">
                            <p class="upload-text">CARREGAR IMAGEM</p>

                            <div class="upload-controls hidden">
                                <div class="upload-overlay"></div>
                                <button class="upload-delete" title="Excluir Imagem">✕</button>
                            </div>
                        </div>
                    </div>

                    <div class="text-details-container">
                        <label class="input-label">NOME DO CURSO</label>
                        <input type="text" id="course-name-input" class="course-text-input" placeholder="Nome do curso">

                        <label class="input-label tag-label-row">
                            TAGS
                            <span class="tag-limit-message hidden" id="tag-limit-message-display">3 DE 3</span>
                        </label>

                        <div class="tag-input-container">
                            <div id="tags-display" class="tags-display"></div>
                            <input type="text" id="tag-input" class="tag-input" placeholder="Adicionar tag">
                        </div>
                    </div>

                </div>

                <label class="input-label">DESCRIÇÃO</label>
                <textarea id="course-desc-input" class="course-textarea"
                    placeholder="Escreva aqui uma breve descrição do curso..."></textarea>

                <label class="input-label">CONTEÚDO</label>
                <div class="content-edit-grid" id="content-edit-grid">

                    <div class="add-content-card" id="add-content-card-btn">
                        <div class="add-icon">+</div>
                    </div>
                </div>

                <div class="confirm-bar hidden" id="confirmBar">
                    <div class="confirm-text">
                        <strong>Confirmar exclusão</strong>
                        <p>Tem certeza que deseja excluir este conteúdo?</p>
                    </div>

                    <div class="confirm-buttons">
                        <button class="confirm-cancel">Cancelar</button>
                        <button class="confirm-ok">Excluir</button>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="save-btn">SALVAR</button>
                </div>
            </div>
        </div>
    </div>

    <aside class="sidebar content-editor-sidebar">

        <div class="sidebar-scrollable-content">

            <h2 class="input-label">SELECIONE O TIPO</h2>

            <div class="content-type-selector">

                <input type="radio" name="content-type" id="type-video" class="type-radio" checked>
                <label for="type-video" class="type-label">VÍDEO</label>

                <input type="radio" name="content-type" id="type-text" class="type-radio">
                <label for="type-text" class="type-label">TEXTO</label>

                <input type="radio" name="content-type" id="type-file" class="type-radio">
                <label for="type-file" class="type-label">ARQUIVO</label>

                <input type="radio" name="content-type" id="type-quiz" class="type-radio">
                <label for="type-quiz" class="type-label">QUIZ</label>

            </div>

            <div class="content-item-editor">

                <label class="input-label">NOME</label>
                <input type="text" class="course-text-input" placeholder="Nome do conteúdo">

                <div class="content-type-section-container">

                    <div class="content-type-section video-section">
                        <label class="input-label">VÍDEO</label>

                        <div class="upload-box upload-size-video" id="video-upload-box" data-type="video">
                            <img id="video-frame-preview" class="upload-preview hidden" alt="">
                            <p class="upload-text">CARREGAR VÍDEO</p>

                            <div class="upload-controls hidden">
                                <div class="upload-overlay"></div>
                                <button class="upload-delete" title="Excluir Vídeo">✕</button>
                            </div>
                        </div>
                    </div>

                    <div class="content-type-section text-section">
                        <label class="input-label">CONTEÚDO TEXTUAL</label>
                        <textarea class="course-textarea textarea-lg-sidebar" rows="10"
                            placeholder="Insira aqui o texto completo do conteúdo."></textarea>
                    </div>

                    <div class="content-type-section file-section">
                        <label class="input-label">ARQUIVO (PDF, DOCX, ETC.)</label>

                        <div class="upload-box upload-size-file" data-type="file">
                            <p class="upload-text">CARREGAR ARQUIVO</p>
                        </div>
                    </div>

                    <div class="content-type-section quiz-section">
                        <label class="input-label">PERGUNTAS DO QUIZ</label>
                        <div class="quiz-editor-area" id="quiz-editor-area">

                            <div class="quiz-question-block" data-question-id="1">
                                <label class="input-label small-label">PERGUNTA 1</label>
                                <textarea class="course-textarea textarea-sm-sidebar"
                                    placeholder="Digite o texto da pergunta..."></textarea>

                                <label class="input-label small-label">RESPOSTAS (2 a 4)</label>
                                <div class="answer-options-container">

                                    <div class="answer-option">
                                        <input type="radio" name="correct-answer-1" class="correct-radio" value="1"
                                            checked>
                                        <input type="text" class="course-text-input answer-input"
                                            placeholder="Opção de resposta 1">
                                        <button class="remove-answer-btn hidden">✕</button>
                                    </div>

                                    <div class="answer-option">
                                        <input type="radio" name="correct-answer-1" class="correct-radio" value="2">
                                        <input type="text" class="course-text-input answer-input"
                                            placeholder="Opção de resposta 2">
                                        <button class="remove-answer-btn hidden">✕</button>
                                    </div>

                                </div>

                                <div class="quiz-controls">
                                    <button class="add-answer-btn">+ Adicionar Resposta</button>
                                    <button class="remove-question-btn">Excluir Pergunta</button>
                                </div>

                            </div>

                            <button class="add-question-btn" id="add-question-btn">+ Adicionar Pergunta</button>

                        </div>
                    </div>
                </div>
            </div>

            </div>

        <div class="sidebar-fixed-footer">
            <button id="save-content-btn" class="save-btn">SALVAR ALTERAÇÕES</button>
        </div>

    </aside>

    <script src="../js/editarCurso.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</body>

</html>
