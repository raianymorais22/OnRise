                <div class="subtitulo"><p class="texto">ÍNDICES DO MERCADO FINANCEIRO</p><button class="addBtn mt-4" id="addB">Add</button></div>

            <div id="caxona2" class="col-md-6">
                <div class="subtitulo"><p class="texto">VALORES EM TEMPO REAL</p></div>
                <div class="caixa" id="caixa2">
                    
                    <div class="caixaInfo profit">
                        <div class="ci1">
                            <p>Dolar</p>
                        </div>
                        <div class="ci2">
                            <p class="preco" id="precoDolar"></p>
                        </div>
                    </div>

                    <div class="caixaInfo profit">
                        <div class="ci1">
                            <p>Euro</p>
                        </div>
                        <div class="ci2">
                            <p class="preco" id="precoEuro"></p>
                        </div>
                    </div>

                    <div class="caixaInfo profit">
                        <div class="ci1">
                            <p>Iene</p>
                        </div>
                        <div class="ci2">
                            <p class="preco" id="precoYen"></p>
                        </div>
                    </div>

                    <div class="caixaInfo profit">
                        <div class="ci1">
                            <p>Bitcoin</p>
                        </div>
                        <div class="ci2">
                            <p class="preco" id="precoBTC"></p>
                        </div>
                    </div>

                    <div class="caixaInfo profit">
                        <div class="ci1">

                    <div class="caixaInfo profit">
                        <div class="ci1">

                </div>
            </div>
        </div>

        <div class="popup" id="popupao">
            <div class="popup-content">
                <h3>Add Informação do Mercado</h3>
                <label>Nome:</label>
                <input type="text" id="nome" placeholder="Ex: Dólar">
                <label>Id:</label>
                <input type="text" id="id" placeholder="Ex: 67">
                <label>Preço:</label>
                <input type="number" step="0.01" id="preco" placeholder="Ex: 5.64">
                <label>Variação (%):</label>
                <input type="number" step="0.01" id="perCent" placeholder="Ex: 0.34 ou -0.21">
                <button class="btn btn-success" id="submitInfo">Add</button>
                <!-- <button id="submitInfo2">Add2</button> -->
                <button class="btn btn-danger" id="closePopup">Cancelar</button>
            </div>
        </div>

        <div class="popup" id="popupedit">
            <div class="popup-content">
                <h3>Editar Informação do Mercado</h3>
                <label>Nome:</label>
                <input type="text" id="nomE" placeholder="Ex: Dólar">
                <label>Preço:</label>
                <input type="number" step="0.01" id="precoE" placeholder="Ex: 5.64">
                <label>Variação (%):</label>
                <input type="number" step="0.01" id="perCentE" placeholder="Ex: 0.34 ou -0.21">
                <button class="btn btn-success" id="editInfo">Editar</button>
                <!-- <button id="submitInfo2">Add2</button> -->
                <button class="btn btn-danger" id="closePopupedit">Cancelar</button>
            </div>
        </div>

    </div>
