        title: "‘Legado das eleições 2026 será horrível, todos perderemos’, diz economista da ARX",
        meta: "Publicado em 14 de outubro de 2025 — Economia",
        image: "imgs/economia.png",
        content: "<p><b>Para Gabriel Leal de Barros, estratégia do governo Lula de elevar receita para cobrir as contas cria 'fadiga no processo político'</b></p><h3>Economista prevê cenário político e fiscal desafiador</h3><p>O economista-chefe da <b>ARX Investimentos</b>, <b>Gabriel Leal de Barros</b>, afirmou nesta terça-feira (14) que as eleições presidenciais de <b>2026</b> devem deixar um <b>“legado horrível”</b> para o Brasil. Segundo ele, o ambiente político e fiscal caminha para um ponto de tensão que poderá gerar prejuízos a todos os lados do espectro político e econômico.</p><p>Durante o evento <i>Global Voices</i>, promovido pela <b>Confederação Nacional do Comércio de Bens, Serviços e Turismo (CNC)</b>, em São Paulo, o economista fez um alerta sobre o risco de deterioração das expectativas e da governabilidade, caso o governo continue apostando em medidas de arrecadação sem contrapartidas no corte de gastos públicos.</p><h3>‘Todos vão perder’, diz economista, citando Dilma Rousseff</h3><p>Fazendo referência à famosa frase da ex-presidente <b>Dilma Rousseff</b> (PT) — “nem quem ganhar nem perder vai ganhar ou perder, vai todo mundo perder” —, Barros afirmou que o mesmo espírito deve marcar as eleições de 2026: “A eleição de 2026 deixará um legado horrível, vai ser como aquela frase da Dilma: ninguém sai ganhando”.</p><p>O comentário provocou risos na plateia, mas o economista ressaltou que o tom era de <b>preocupação genuína</b> com os rumos fiscais e políticos do país.</p><h3>Crítica à estratégia fiscal do governo</h3><p>Para o economista, a atual estratégia do governo <b>Luiz Inácio Lula da Silva (PT)</b> de concentrar esforços em elevar a receita — com foco em aumento de tributos e reversão de isenções — cria o que ele chama de <b>“fadiga no processo político”</b>. Segundo ele, a insistência em medidas unilaterais de arrecadação pode gerar resistência no Congresso e perda de credibilidade junto ao setor produtivo.</p><p>“A agenda é correta, mas, como ela vem com uma estratégia unilateral — elevar a arrecadação — e não tem nada pelo lado do gasto, você cria um problema de condução de estratégia”, disse Barros. “O mais estrutural seria começar pelo gasto. Entregar corte concreto na despesa e, depois, pedir contribuição do setor produtivo [via retirada de benefícios tributários]”.</p><h3>‘Cortar primeiro, cobrar depois’</h3><p>Barros defende que o ajuste fiscal precisa começar com o <b>setor público dando o exemplo</b>. Na visão dele, o governo deveria apresentar um plano claro de <b>redução de despesas obrigatórias</b>, seguido por uma negociação mais ampla sobre renúncias fiscais e incentivos tributários. “Quando você mostra esforço real no corte de gastos, ganha legitimidade para pedir contribuição de outros setores”, explicou.</p><h3>Impactos no cenário eleitoral e econômico</h3><p>Para o economista, o descontentamento crescente com a condução da política fiscal pode se refletir nas eleições de 2026, dificultando o consenso em torno de uma agenda de responsabilidade fiscal. “O cenário eleitoral vai ser contaminado pelo fiscal, e o fiscal vai ser contaminado pelo eleitoral. Essa combinação é explosiva”, afirmou.</p><p>Ele acrescentou que o Brasil pode enfrentar um <b>ambiente de estagnação política</b> e incerteza econômica prolongada, caso não haja mudanças na condução das contas públicas. “Se o governo insistir nesse modelo, não teremos apenas um problema de curto prazo, mas um <b>legado institucional e fiscal difícil de reverter</b>”, completou.</p><h3>O alerta do mercado</h3><p>A fala de Barros reflete o <b>tom de cautela</b> que tem dominado o mercado financeiro brasileiro nas últimas semanas. Analistas têm alertado que o excesso de medidas voltadas à arrecadação, sem contrapartidas na redução de despesas, pode enfraquecer a confiança dos investidores e pressionar o câmbio e a curva de juros.</p><p>Para ele, a confiança do setor privado só voltará de forma sólida quando houver clareza sobre <b>metas fiscais críveis</b> e um plano de médio prazo para conter o crescimento das despesas obrigatórias. “O Brasil tem um histórico de prometer e não entregar. O desafio agora é mostrar que essa história pode ser diferente”, finalizou.</p>"

      "2": {
        title: "Manhã Cripto: Ouro atinge novo recorde de US$ 4.200, enquanto bilhões em criptomoedas saem das corretoras",
        meta: "Publicado em 20 de outubro de 2025 — Criptomoedas e Mercado",
        image: "imgs/cripto.png",
        content: "<p><b>Ouro supera marca histórica e sinaliza aversão ao risco global</b><br></p><p>Os contratos futuros de <b>ouro</b> ultrapassaram brevemente os <b>US$ 4.200 por onça</b> e encerraram o pregão de terça-feira em <b>US$ 4.197,60</b>, segundo dados do <i>CME Group</i>. A publicação <i>The Kobeissi Letter</i> destacou que esta é a <b>primeira vez na história</b> que o metal precioso atinge esse patamar, acumulando uma impressionante <b>alta de quase 60% em 2025</b>.</p><h3>Saídas recordes da Binance e outras corretoras</h3><p>Paralelamente, dados da <i>CoinGlass</i> apontaram <b>mais de US$ 21 bilhões em saídas da Binance</b> e retiradas contínuas de outras grandes exchanges, menos de uma semana após a forte correção no mercado de criptoativos — episódio apelidado de <b>“Black Friday das criptos”</b>, quando <b>Bitcoin</b> e outras moedas digitais despencaram após a reversão dos fluxos em <b>ETFs de criptoativos</b>.</p><h3>Mudança no apetite por risco</h3><p>Analistas interpretam essa divergência entre o rali do ouro e as perdas no mercado cripto como um sinal claro de <b>mudança no apetite global por risco</b>. “O recorde do ouro sinaliza uma aversão aguda ao risco em meio a turbulências comerciais, enquanto as saídas lideradas pela Binance refletem o fechamento de posições alavancadas em ativos de risco”, explicou <b>Charles d’Haussy</b>, CEO da <i>dYdX Foundation</i>, ao site <i>Decrypt</i>.</p><h3>Investidores buscam segurança antes do Beige Book</h3><p><b>Shawn Young</b>, analista-chefe da <i>MEXC Research</i>, afirmou que a alta do ouro representa uma “<b>rotação para ativos de segurança</b>” e não uma liquidação estrutural do mercado, destacando que muitos investidores estão <b>reduzindo exposição antes da divulgação do Beige Book</b> do <i>Federal Reserve</i>.</p><h3>Perspectiva para os próximos dias</h3><p>Com o avanço do ouro e a retração no mercado de criptoativos, o foco agora se volta aos próximos dados econômicos dos EUA e ao comportamento dos fundos institucionais, que devem indicar se essa <b>migração para ativos de proteção</b> será temporária ou o início de uma <b>nova tendência de aversão global ao risco</b>.</p>"

      "3": {
        title: "Ele vendeu sua empresa por US$ 54 milhões e agora aposta em IA como futuro",
        meta: "Publicado em 14 de outubro de 2025 — Startups e Tecnologia",
        image: "imgs/startup.png",
        content: "<p><b>Brandon Harris, fundador da Playmaker, está investindo capital próprio em uma plataforma que visa democratizar estratégias de Wall Street com IA para pessoas comuns.</b></p><h3>Do sucesso no esporte à revolução nos investimentos</h3><p>Após vender sua empresa de mídia esportiva, a <b>Playmaker</b>, por <b>US$ 54 milhões</b> para a <b>Better Collective</b>, o empreendedor <b>Brandon Harris</b> decidiu seguir um novo caminho: aplicar sua experiência em tecnologia e dados na criação de uma startup voltada ao setor financeiro. Ele investiu <b>US$ 700 mil</b> de capital próprio na <b>Invested Inc</b>, uma plataforma que usa <b>inteligência artificial (IA)</b> para transformar a forma como pessoas comuns aprendem, analisam e investem no mercado financeiro.</p><h3>Missão: democratizar o acesso à inteligência de mercado</h3><p>Descrito por colegas como um <i>“viciado em propósito”</i>, Harris afirma que seu objetivo é tornar as <b>ferramentas sofisticadas de Wall Street</b> — antes restritas a fundos e grandes investidores — acessíveis a qualquer pessoa com um celular e curiosidade sobre finanças. “Queremos colocar o poder da IA nas mãos de quem sempre foi deixado de fora do jogo”, explica.</p><p>Segundo ele, a <b>Invested Inc</b> quer atuar como uma espécie de <i>“assistente de investimento inteligente”</i>, combinando dados de mercado, comportamento de usuários e análise em tempo real para sugerir estratégias personalizadas, sempre com foco educacional e transparência algorítmica.</p><h3>A nova era da informação financeira</h3><p>Harris destaca que a <b>mídia financeira está se descentralizando</b> rapidamente. Em vez de depender de analistas tradicionais ou canais econômicos, cada vez mais investidores buscam informações em <b>redes sociais</b> como TikTok, X (antigo Twitter) e YouTube — um movimento que ele vê com ambiguidade. “Há mais acesso à informação, mas também mais ruído, fraudes e <i>meme stocks</i>”, observa.</p><p>Para o empreendedor, essa transformação abre espaço para soluções de IA que consigam filtrar o conteúdo de qualidade e oferecer insights baseados em dados reais, reduzindo a influência de modismos e narrativas superficiais.</p><h3>IA como aliada, não substituta</h3><p>Apesar de estar na vanguarda da tecnologia, Harris defende que a IA deve ser vista como uma <b>ferramenta de empoderamento.</b>"

      "4": {
        title: "De ex-estudante a bilionário: como o criador da Figma fez uma empresa de design valer R$ 400 bilhões",
        meta: "Publicado em 14 de outubro de 2025 — Tecnologia e Negócios",
        image: "imgs/tecnologia.png",
        content: "<p><b>Dylan Field, ex-bolsista de Peter Thiel, viu sua startup de design disparar no IPO e agora vale mais de US$ 71 bilhões.</b></p><h3>De bolsista visionário a líder de uma revolução no design</h3><p>O nome <b>Dylan Field</b> entrou de vez para a história da tecnologia. Ex-bolsista do investidor bilionário <b>Peter Thiel</b>, ele fundou a <b>Figma</b> com o objetivo de tornar o design colaborativo, acessível e baseado na nuvem — uma aposta ousada em uma época em que ferramentas locais ainda dominavam o mercado.</p><p>Mais de uma década depois, essa visão se provou certeira: a <b>Figma protagonizou um dos IPOs mais aguardados de 2025</b>. Suas ações <b>triplicaram</b> de valor logo na estreia na Bolsa de Nova York, elevando a avaliação da empresa para mais de <b>US$ 71 bilhões</b> (quase <b>R$ 400 bilhões</b>).</p><h3>O império do design digital</h3><p>A plataforma da Figma revolucionou a forma como <b>equipes de design, produto e engenharia</b> trabalham em conjunto. Ao permitir edição em tempo real e colaboração simultânea na nuvem, ela se tornou indispensável em grandes empresas de tecnologia e startups pelo mundo.</p><p>Com o sucesso do IPO, o patrimônio pessoal de Field saltou para cerca de <b>US$ 6,6 bilhões</b>. Ele, porém, continua defendendo uma cultura de simplicidade e colaboração, valores que, segundo ele, foram a base da empresa desde os tempos em que trabalhava em um pequeno escritório com poucos recursos.</p><h3>Desafios e o futuro do design</h3><p>Mesmo com o sucesso estrondoso, Field reconhece que o desafio agora é <b>manter a inovação</b> e <b>preservar a essência criativa</b> da Figma diante da pressão dos investidores e do crescimento acelerado.</p><p>Para ele, o design deixou de ser apenas uma etapa estética e se tornou uma <b>ferramenta estratégica</b> que influencia toda a experiência digital. “Hoje, o design é o ponto de encontro entre tecnologia e emoção humana. Nosso papel é garantir que essa ponte continue sólida”, afirmou em entrevista recente.</p><h3>Uma nova era para o design colaborativo</h3><p>A Figma se consolida como símbolo da nova era do design digital — uma era em que a colaboração, a acessibilidade e a criatividade coletiva são mais valiosas do que nunca. E Dylan Field, de ex-estudante curioso a bilionário visionário, representa o espírito de uma geração que acredita que <b>inovação e propósito podem caminhar lado a lado</b>.</p>"

      "5": {
        title: "InfoMoney é o primeiro veículo de comunicação a integrar Programa Mantenedores Aberje",
        meta: "Publicado em 12 de outubro de 2025 — Business",
        image: "imgs/business.png",
        content: "<p><b>O InfoMoney tornou-se o primeiro veículo de comunicação a ingressar no Programa Mantenedores da Aberje, reforçando o compromisso com a excelência e a inovação na comunicação corporativa no Brasil.</b></p><h3>Uma parceria inédita no ecossistema da comunicação</h3><p>Com a entrada do InfoMoney, a <b>Associação Brasileira de Comunicação Empresarial (Aberje)</b> dá um passo inédito ao incluir um veículo de mídia entre seus mantenedores — grupo composto por empresas e instituições que apoiam o desenvolvimento estratégico da comunicação empresarial no país.</p><p>A iniciativa reforça a importância da <b>mídia especializada</b> como agente ativo no diálogo entre marcas, público e mercado financeiro, promovendo transparência, educação e responsabilidade informacional.</p><h3>Convergência entre jornalismo e comunicação corporativa</h3><p>O acordo prevê a realização conjunta de eventos voltados a temas como <b>inovação, dados e transformação digital</b> na comunicação, além de oferecer condições especiais para organizações associadas da Aberje em parcerias comerciais com o InfoMoney.</p><p>Segundo as entidades, o objetivo é criar um <i>espaço de colaboração</i> que estimule o intercâmbio de conhecimento entre empresas, profissionais e veículos, fortalecendo o ecossistema da comunicação empresarial brasileira.</p><h3>Fortalecendo a credibilidade e o diálogo</h3><p>Para o InfoMoney, o ingresso no programa simboliza o reconhecimento do jornalismo econômico como pilar estratégico no desenvolvimento corporativo do país. Já para a Aberje, trata-se de um marco que amplia as fronteiras entre o universo corporativo e a imprensa.</p><p>Com a parceria, ambas as instituições esperam fomentar novas práticas, promover o debate ético e impulsionar a <b>comunicação empresarial como instrumento de valor social e econômico</b>.</p>"

      "6": {
        title: "Selic alta mantém pressão e B3 (B3SA3) apresenta dados mistos em prévia do 3T25",
        meta: "Publicado em 11 de outubro de 2025 — Mercados",
        image: "imgs/markets.jpg",
        content: "<p><b>A B3 (B3SA3) divulgou os números operacionais de setembro e do terceiro trimestre de 2025, em um cenário de juros altos e menor volatilidade. As ações reagiram com leve alta de 1,35%, a R$ 12,72.</b></p><h3>Um trimestre de contrastes</h3><p>Apesar do desempenho considerado fraco, analistas da <b>XP Investimentos</b> apontam que os resultados vieram dentro do esperado, refletindo um <b>mercado de capitais ainda pressionado</b> pela Selic elevada e pela redução no volume de negociações.</p><p>No segmento de <b>Renda Fixa</b>, no entanto, o momento segue positivo, com novas emissões crescendo 12% na comparação anual. Para a XP, essa diversificação mostra-se essencial para que a B3 mantenha resiliência em um ambiente de juros desafiador.</p><h3>Análises divididas entre bancos de investimento</h3><p>O <b>JPMorgan</b> avaliou que o <i>ADTV</i> (volume médio diário negociado) de ações ficou abaixo das estimativas, enquanto as receitas de derivativos listados apresentaram leve melhora. O banco manteve postura neutra diante da combinação entre resultados mistos e expectativas já ajustadas.</p><p>O <b>Goldman Sachs</b> também destacou a queda de 6% nas receitas com derivativos fora do segmento de ações, embora o desempenho tenha superado temores iniciais. Por outro lado, os <b>volumes OTC sob custódia</b> e os registros de renda fixa mostraram crescimento acima do esperado, reforçando a relevância das unidades não ligadas à bolsa de valores.</p><h3>Resiliência em meio à alta dos juros</h3><p>Com a Selic ainda em patamares elevados, o mercado de capitais brasileiro segue cauteloso. A expectativa dos analistas é que a <b>diversificação de receitas e a estrutura de custos controlada</b> continuem sendo pilares para a estabilidade da B3 até o fim do ano.</p>"
      },
      "7": {

        meta: "Publicado em 10 de outubro de 2025 — Finanças Internacionais",
        image: "imgs/morgan.png",
        content: "<p><b>O Morgan Stanley registrou lucro líquido de US$ 4,61 bilhões no terceiro trimestre de 2025, um aumento de 44,5% em relação ao mesmo período do ano anterior, superando amplamente as projeções do mercado.</b></p><h3>Resultados acima das expectativas</h3><p>Entre julho e setembro, o <b>lucro diluído por ação</b> ficou em US$ 2,80, bem acima do consenso da <b>FactSet</b>, que previa US$ 2,10. A <b>receita líquida</b> avançou 18,5% no período, alcançando US$ 18,22 bilhões, também superando as estimativas de US$ 16,69 bilhões.</p><h3>Força no gerenciamento de riqueza</h3><p>Segundo o CEO <b>Ted Pick</b>, o resultado foi impulsionado principalmente pela divisão de <b>Gerenciamento de Riqueza</b>, que registrou margem de lucro antes de impostos de 30% e adicionou US$ 81 bilhões em novos ativos líquidos. O banco também encerrou o trimestre com <b>provisões zeradas para perdas de crédito</b>, frente aos US$ 79 milhões registrados no mesmo período de 2024.</p><h3>Confiança renovada dos investidores</h3><p>No pré-mercado de Nova York, as ações do Morgan Stanley subiram 3,12%, refletindo a confiança dos investidores na <b>estratégia de diversificação</b> e no desempenho robusto das principais divisões do banco. O resultado reforça a tendência de recuperação do setor bancário norte-americano em meio à estabilização econômica dos EUA.</p>"

      "8": {
        title: "Eletrobras vende participação na Eletronuclear e reduz último grande risco da tese de investimentos",
        meta: "Publicado em 9 de outubro de 2025 — Mercados",
        image: "imgs/eletrobras.jpg",
        content: "<p><b>A Eletrobras (ELET3;ELET6) anunciou a venda de sua participação minoritária na Eletronuclear para a J&F, marcando um dos principais movimentos de redução de risco desde sua privatização. As ações reagiram em alta nesta quarta-feira, com ELET3 subindo 2,39% e ELET6 avançando 2,47%.</b></p><h3>Negócio estratégico e desinvestimento em energia nuclear</h3><p>O contrato, de <b>R$ 535 milhões</b>, transfere a fatia da estatal para a <b>Âmbar Energia</b>, empresa do grupo J&F, que passa a deter 68% do capital total da Eletronuclear (35,3% do capital votante). A operação marca a <b>saída definitiva da Eletrobras do setor nuclear</b>, em linha com sua estratégia de focar em fontes renováveis e transmissão.</p><h3>Alívio financeiro e redução de riscos</h3><p>Segundo o <b>Itaú BBA</b>, a transação elimina obrigações relevantes: a subscrição de R$ 2,4 bilhões em debêntures e garantias de R$ 6 bilhões. O banco também destaca o potencial de criação de crédito tributário e de <b>desalavancagem financeira</b> de até 0,2 vez. A conclusão do negócio depende de aprovações regulatórias e deve ocorrer apenas em 2026.</p><h3>Impacto contábil e perspectivas futuras</h3><p>A Eletrobras deve registrar uma <b>provisão contábil de R$ 7 bilhões</b> no terceiro trimestre de 2025, reflexo do valor contábil de R$ 7,8 bilhões da participação vendida. Ainda assim, analistas do <b>Bradesco BBI</b> e da <b>Ativa Investimentos</b> consideram o movimento positivo, destacando que o principal ganho está na <b>redução do risco regulatório e jurídico</b>.</p><p>Com o desinvestimento, a empresa reforça seu foco em geração renovável e otimização de capital. “A Eletrobras agora entra em uma nova fase de estabilidade, com fundamentos sólidos e visão estratégica clara”, conclui o relatório do BBA.</p>"

      "9": {
        title: "Corinthians registra déficit de R$ 60 milhões e dívida cresce para R$ 2,6 bilhões no 1º semestre",
        meta: "Publicado em 8 de outubro de 2025 — Esportes",
        image: "imgs/futebol.jpg",
        content: "<p><b>Em meio à crise financeira, o Corinthians encerrou o primeiro semestre de 2025 com um déficit de R$ 60,2 milhões e uma dívida total de R$ 2,6 bilhões, segundo balancete divulgado pelo clube.</b></p><h3>Resultado muito abaixo do previsto</h3><p>O desempenho ficou distante do superávit de R$ 2,3 milhões projetado pela gestão anterior, comandada por <b>Augusto Melo</b>. O endividamento aumentou em R$ 100 milhões desde o fim de 2024, dos quais R$ 675,2 milhões referem-se à dívida com a <b>Caixa Econômica Federal</b> pela Neo Química Arena.</p><h3>Receitas estagnadas e despesas fora de controle</h3><p>Enquanto as <b>receitas líquidas</b> ficaram próximas do esperado — R$ 380 milhões contra R$ 381 milhões projetados —, as <b>despesas</b> extrapolaram o orçamento em quase R$ 100 milhões, totalizando R$ 424,8 milhões. O gasto com pessoal foi o principal fator de desequilíbrio, chegando a R$ 298,6 milhões, muito acima do limite de R$ 219 milhões definido no orçamento.</p><h3>Gestão e negociações controversas</h3><p>Apesar de um bom desempenho nas <b>vendas de atletas</b>, com saldo líquido de R$ 73,6 milhões, o clube perdeu receitas por negociações mal conduzidas. O caso do atacante <b>Pedro</b>, vendido ao Al-Ittihad, expôs a venda antecipada de 30% dos direitos do jogador ao Zenit, em troca da quitação de uma dívida com a <b>Elenko Sports</b>.</p><h3>Transfer ban e busca por soluções</h3><p>A crise financeira também se reflete no campo esportivo: o clube enfrenta um <b>transfer ban da FIFA</b> devido à dívida de R$ 33 milhões (já atualizada para R$ 40 milhões) com o Santos Laguna pela compra do zagueiro Félix Torres. O presidente <b>Osmar Stábile</b> tenta negociar com o clube mexicano e atrair novas fontes de receita, incluindo a renegociação dos <b>naming rights</b> da Neo Química Arena, cujo contrato atual com a Hypera Pharma vale cerca de R$ 300 milhões até 2040.</p><p>Com conversas abertas com quatro potenciais parceiros — incluindo a própria Hypera e uma casa de apostas —, o clube busca uma saída para equilibrar o fluxo de caixa e iniciar uma <b>reconstrução financeira e institucional</b> de longo prazo.</p>"

    };

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const id = getQueryParam('id') || '1';
    const data = noticias[id];

    if (data) {
      document.getElementById('titulo').innerText = data.title;
      document.getElementById('meta').innerText = data.meta;
      if (data.image) {
        const img = document.getElementById('imagem');
        img.src = data.image;
        img.style.display = '';
      }
      document.getElementById('conteudo').innerHTML = data.content;

      document.querySelector('.conteudo-noticia')?.classList.add('visible');
    } else {
      document.getElementById('titulo').innerText = "Notícia não encontrada";
      document.getElementById('conteudo').innerHTML = "<p>Desculpe, essa notícia não existe ou foi removida.</p>";
    } 
  </script>
</body>

</html>
